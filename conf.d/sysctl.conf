# BBR 拥塞控制
net.ipv4.tcp_congestion_control = bbr
net.core.default_qdisc = fq

# TCP/UDP 内存配置
net.ipv4.tcp_mem = 393216 1048576 8388608
net.ipv4.udp_mem = 262144 524288 1048576

# 全局套接字默认接受缓冲区
net.ipv4.tcp_rmem = 8192 262144 536870912
net.core.rmem_default = 262144
net.core.rmem_max = 134217728

# 全局套接字默认发送缓冲区
net.ipv4.tcp_wmem = 4096 16384 536870912
net.core.wmem_default = 262144
net.core.wmem_max = 134217728

# ICMP Ping 组权限范围
net.ipv4.ping_group_range = 1000 65535
net.ipv4.icmp_ratemask = 2147481591

# TCP 接收窗口缩放比例
net.ipv4.tcp_adv_win_scale = 1
# TCP 自动窗口 支持 64KB 严禁关闭
net.ipv4.tcp_window_scaling = 1

# 智能强制回收内存 严禁开启
net.ipv4.tcp_shrink_window = 0

# 接收内存碎片整理的最大字节数阈值
net.ipv4.tcp_collapse_max_bytes = 6291456

# TCP 拥塞窗口 RTO 时间 严禁调整
net.ipv4.tcp_slow_start_after_idle = 0

# TCP 连接队列配置
# 半连接队列大小
net.ipv4.tcp_max_syn_backlog = 16384
# TIME_WAIT 状态连接最大数量
net.ipv4.tcp_max_tw_buckets = 250000
# 物理网卡软件接收队列
net.core.netdev_max_backlog = 16384
# 孤儿连接绝对上限
net.ipv4.tcp_max_orphans = 32768
# 全连接队列大小
net.core.somaxconn = 65536

# TCP 超时与重试配置
net.ipv4.tcp_syn_linear_timeouts = 4

# 发送缓冲区 未发送数据低水位阈值
net.ipv4.tcp_notsent_lowat = 16384

# TCP 连接队列溢出行为 严禁调整
net.ipv4.tcp_abort_on_overflow = 0

# 低频活动 TCP 连接 重传超时
net.ipv4.tcp_thin_linear_timeouts = 1

# 复用处于 TIME_WAIT 状态
net.ipv4.tcp_tw_reuse = 1
#net.ipv4.tcp_tw_recycle = 0

# TCP 连接变为孤儿连接重试
net.ipv4.tcp_orphan_retries = 3

# TCP SYN 连接超时重传次数
net.ipv4.tcp_synack_retries = 2
net.ipv4.tcp_syn_retries = 2

# 放弃回应一个 连接
net.ipv4.tcp_retries1 = 5
# 丢弃已建立通讯 连接
net.ipv4.tcp_retries2 = 10

# 减少处于 FIN-WAIT-2
net.ipv4.tcp_fin_timeout = 15

# TCP 保活配置
# 空闲多久启动保活探测
net.ipv4.tcp_keepalive_time = 300
# 保活探测最大次数字
net.ipv4.tcp_keepalive_probes = 3
# 保活探测包发送间隔
net.ipv4.tcp_keepalive_intvl = 15

# TCP 安全配置
# 开启 SYN 洪水攻击保护
net.ipv4.tcp_syncookies = 1
# 防御 TCP 状态攻击
net.ipv4.tcp_rfc1337 = 0

# 路由缓存刷新频率
net.ipv4.route.gc_timeout = 600
# 是否保存其连接 metrics 数据
net.ipv4.tcp_no_metrics_save = 1

# UDP 接收/发送缓冲区的最小值
net.ipv4.udp_rmem_min = 16384
net.ipv4.udp_wmem_min = 16384

# TCP 紧急指针
# 控制 TCP 紧急指针
net.ipv4.tcp_stdurg = 0

# XFRM 框架配置
# 禁用 XFRM 框架
net.ipv4.conf.lo.disable_xfrm = 1
net.ipv4.conf.all.disable_xfrm = 1
net.ipv4.conf.default.disable_xfrm = 1

# 文件系统监控配置
fs.inotify.max_queued_events = 1048576
# 监视的最大用户监视器数量
fs.inotify.max_user_watches = 1048576
# 增加系统文件描述符限制
fs.inotify.max_user_instances = 8192

# TCP 低延迟配置
# IPv4 低延迟参数 暂时调整
net.ipv4.tcp_low_latency = 1

# TCP FastOpen
net.ipv4.tcp_fastopen = 3

# TCP 重排序配置
# TCP 流中重排序的数据
net.ipv4.tcp_reordering = 5
# TCP 最大数据包重排乱序重组数量
net.ipv4.tcp_max_reordering = 1024

# TCP 重传配置
# TCP 重传小分片合并开关
net.ipv4.tcp_retrans_collapse = 0

# 自动阻塞判断 严禁开启
net.ipv4.tcp_autocorking = 0

# TCP 内存自动调整
net.ipv4.tcp_moderate_rcvbuf = 1

# 单个 TSO 段可消耗拥塞窗口
net.ipv4.tcp_tso_win_divisor = 3

# TCP Pacing Rate 调整参数
net.ipv4.tcp_pacing_ss_ratio = 220
net.ipv4.tcp_pacing_ca_ratio = 125

# Netfilter 连接跟踪配置
net.nf_conntrack_max = 524288
net.netfilter.nf_conntrack_max = 524288
net.netfilter.nf_conntrack_tcp_be_liberal = 1
net.netfilter.nf_conntrack_tcp_max_retrans = 5
net.netfilter.nf_conntrack_generic_timeout = 90
net.netfilter.nf_conntrack_tcp_timeout_established = 7200

# TCP 恢复机制配置
# 网络异常时恢复机制
net.ipv4.tcp_recovery = 1
# 启用 TCP 的早期重传机制
net.ipv4.tcp_early_retrans = 3
# TCP 协议中重复选择性确认
net.ipv4.tcp_dsack = 1
# 启用选择应答
net.ipv4.tcp_sack = 1
# 启用转发应答 (Linux 2.6-4.14 有效)
net.ipv4.tcp_fack = 0
# 开启 F-RTO
net.ipv4.tcp_frto = 2

# ECN 配置
net.ipv4.tcp_ecn = 0
net.ipv4.tcp_ecn_fallback = 0

# 内核调度配置
kernel.sched_schedstats = 0
# 核心转储管道限制
kernel.core_pipe_limit = 16
# 核心文件带 PID
kernel.core_uses_pid = 0
kernel.core_pattern = /dev/null

# 内核日志配置
# 停止控制台上的低级消息
kernel.printk = 3 4 1 3
kernel.printk_delay = 0
kernel.printk_devkmsg = ratelimit
kernel.printk_ratelimit = 5
kernel.printk_ratelimit_burst = 10

# 内核调度优化
# 优化 CPU 设置
kernel.sched_autogroup_enabled = 0
# 禁用 NUMA balancing
kernel.numa_balancing = 0
kernel.timer_migration = 0

# 内核安全加固
kernel.kptr_restrict = 1
kernel.yama.ptrace_scope = 1
kernel.dmesg_restrict = 1
# 内核的随机地址保护
kernel.randomize_va_space = 2

# 内核消息配置
kernel.msgmnb = 65536
kernel.msgmax = 65536

# 内核响应魔术
kernel.sysrq = 0
kernel.panic = 10
kernel.panic_on_unrecovered_nmi = 1
kernel.panic_on_io_nmi = 1
kernel.panic_on_oops = 1
kernel.panic_on_rcu_stall = 0
kernel.panic_on_warn = 0
kernel.panic_print = 0

# 网络核心配置
# 每 CPU 最大处理包
net.core.dev_weight = 128
# 控制单个套接字
net.core.optmem_max = 262144
# 时间戳携带数据开关
net.core.tstamp_allow_data = 0
net.core.busy_read = 0
net.core.busy_poll = 0
# 每次软中断最多处理的总帧
net.core.netdev_budget = 300

# ARP/NDP 多播探测次数
net.ipv4.neigh.default.mcast_solicit = 3
net.ipv6.neigh.default.mcast_solicit = 3

net.ipv4.neigh.default.gc_stale_time = 120
net.ipv4.neigh.default.gc_thresh3 = 4096
net.ipv4.neigh.default.gc_thresh2 = 2048
net.ipv4.neigh.default.gc_thresh1 = 512

net.ipv6.neigh.default.gc_stale_time = 120
net.ipv6.neigh.default.gc_thresh3 = 4096
net.ipv6.neigh.default.gc_thresh2 = 2048
net.ipv6.neigh.default.gc_thresh1 = 512

# 端口范围配置
net.ipv4.ip_local_port_range = 1024 65535

# 虚拟内存配置
vm.dirty_ratio = 15
vm.swappiness = 5
vm.overcommit_memory = 1
vm.overcommit_ratio = 100
vm.dirty_background_ratio = 5

# 电源管理参数
vm.laptop_mode = 0
vm.page-cluster = 0
vm.oom_kill_allocating_task = 0
vm.zone_reclaim_mode = 0

# 网络安全配置
# 是否接受带有"源路由"选项的 IP 数据包
net.ipv4.conf.default.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0
net.ipv4.conf.all.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0

net.ipv4.conf.default.shared_media = 0
net.ipv4.conf.all.shared_media = 0

# ARP 请求源 IP 地址选择策略
net.ipv4.conf.default.arp_announce = 2
net.ipv4.conf.all.arp_announce = 2
net.ipv4.conf.lo.arp_announce = 0

# 控制 ARP 响应的条件 严禁调整
net.ipv4.conf.default.arp_ignore = 1
net.ipv4.conf.all.arp_ignore = 1

# 控制 ARP 数据包接收过滤
net.ipv4.conf.default.arp_filter = 0
net.ipv4.conf.all.arp_filter = 0

net.ipv4.conf.default.arp_notify = 0
net.ipv4.conf.all.arp_notify = 0

net.ipv4.conf.default.proxy_arp = 0
net.ipv4.conf.all.proxy_arp = 0

# IPv6 配置
net.ipv6.conf.default.use_tempaddr = 0
net.ipv6.conf.all.use_tempaddr = 0

net.ipv6.conf.default.accept_ra = 2
net.ipv6.conf.all.accept_ra = 2

net.ipv6.conf.default.autoconf = 1
net.ipv6.conf.all.autoconf = 1

net.ipv6.conf.all.disable_ipv6 = 0
net.ipv6.conf.default.disable_ipv6 = 0
net.ipv6.conf.lo.disable_ipv6 = 0

# ICMP 重定向配置
# 是否发送 ICMP 重定向报文
net.ipv4.conf.default.send_redirects = 0
net.ipv4.conf.all.send_redirects = 0

# 是否接受其他设备发送的 ICMP 重定向报文
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0
net.ipv4.conf.all.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0

# ICMP 重定向接收的安全增强参数
net.ipv4.conf.default.secure_redirects = 0
net.ipv4.conf.all.secure_redirects = 0

# 本地网络配置
# 是否接受本地生成的本机的数据包
net.ipv4.conf.default.accept_local = 0
net.ipv4.conf.all.accept_local = 0
net.ipv4.conf.lo.accept_local = 1

# 允许路由本地环回网络的流量
net.ipv4.conf.default.route_localnet = 1
net.ipv4.conf.all.route_localnet = 1
net.ipv4.conf.lo.route_localnet = 1

# 开启并记录欺骗, 源路由和重定向包
net.ipv4.conf.default.log_martians = 0
net.ipv4.conf.all.log_martians = 0

# 反向路径过滤 严格调整
net.ipv4.conf.default.rp_filter = 0
net.ipv4.conf.all.rp_filter = 0

# 策略与转发配置
net.ipv4.conf.lo.disable_policy = 1
net.ipv6.conf.lo.disable_policy = 1

net.ipv4.ip_forward = 1
net.ipv6.conf.lo.forwarding = 1
net.ipv6.conf.all.forwarding = 1
net.ipv6.conf.default.forwarding = 1

# 异步 I/O 配置
fs.aio-max-nr = 1048576

# ICMP Echo 配置
# 忽略所有 ICMP Echo 请求
net.ipv4.icmp_echo_ignore_all = 1
net.ipv6.icmp.echo_ignore_all = 1
# 系统会忽略所有 ICMP 回显请求广播包
net.ipv4.icmp_echo_ignore_broadcasts = 1
# 控制 ICMP 错误消息的源地址选择逻辑
net.ipv4.icmp_errors_use_inbound_ifaddr = 1
# 忽略所有来自广播或多播地址的 ICMP 错误响应
net.ipv4.icmp_ignore_bogus_error_responses = 1

# Unix 域套接字配置
net.unix.max_dgram_qlen = 2048

# IGMP 配置
net.ipv4.igmp_max_memberships = 512
net.ipv4.igmp_max_msf = 256

# TCP MTU 探测配置
net.ipv4.tcp_min_rtt_wlen = 32
net.ipv4.tcp_min_tso_segs = 2
net.ipv4.tcp_mtu_probing = 1
net.ipv4.ip_no_pmtu_disc = 0
net.ipv4.tcp_timestamps = 0

# TCP 探测起始基准
net.ipv4.tcp_base_mss = 1200
# 最小通告阈值
net.ipv4.route.min_adv_mss = 1160
# 探测下探底线
net.ipv4.tcp_mtu_probe_floor = 1200
# 路由路径保护底线
net.ipv4.route.min_pmtu = 1240
# 物理发送最小极限
net.ipv4.tcp_min_snd_mss = 1160

# IP 绑定配置
net.ipv4.ip_nonlocal_bind = 1
net.ipv4.ip_autobind_reuse = 1